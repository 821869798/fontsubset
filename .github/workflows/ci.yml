name: CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - Cargo.toml
      - Cargo.lock
      - src/**
      - examples/**
      - packaging/**
      - vendor/**
      - .github/workflows/**
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - src/**
      - examples/**
      - packaging/**
      - vendor/**
      - .github/workflows/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            clang \
            lld \
            libasound2-dev \
            libfontconfig-dev \
            libfreetype6-dev \
            libglib2.0-dev \
            libssl-dev \
            libva-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        shell: bash
        run: cargo fmt --all -- --check

      - name: Check workspace
        shell: bash
        run: cargo check --locked --workspace

      - name: Run tests
        shell: bash
        run: cargo test --locked --workspace

      - name: Run Clippy
        shell: bash
        run: cargo clippy --locked --workspace --all-targets -- -D warnings
